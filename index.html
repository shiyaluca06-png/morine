<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morine</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f7f3ed;
      color: #1f1f1f;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .hero-image {
  width: 320px;
  max-width: 80vw;
  height: auto;
  margin-bottom: 32px;
  opacity: 0;
  animation: logoFadeIn 5s ease forwards;
}

@keyframes logoFadeIn {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

    h1 {
      font-size: 56px;
      font-weight: normal;
      margin: 0 0 20px;
      letter-spacing: 0.04em;
    }

    p {
      font-size: 10px;
      line-height: 1.8;
      max-width: 560px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <img class="hero-image" src="./images/logo/morine_logo_B_1028_1.png" alt="Morine logo">
  
      <p>
        A quiet visual archive for fashion, objects, spaces, and stories.
      </p>
    </div>
  </div>
</body>
</html>
